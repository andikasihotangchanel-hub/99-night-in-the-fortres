<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forest Survival 3D</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}

button{
display:block;
margin-top:5px;
}

#joystick{
position:absolute;
bottom:30px;
left:30px;
width:120px;
height:120px;
background:rgba(255,255,255,0.2);
border-radius:50%;
}

#stick{
width:60px;
height:60px;
background:rgba(255,255,255,0.6);
border-radius:50%;
position:absolute;
left:30px;
top:30px;
}

</style>

</head>

<body>

<div id="ui">

Koin: <span id="coin">0</span><br>
Hari: <span id="day">1</span><br>
Class: <span id="class">None</span>

<button onclick="buyExplorer()">Penjelajah (10)</button>
<button onclick="buyHunter()">Pemburu Koin Raksasa (20)</button>
<button onclick="buyGuard()">Penjaga Hutan (15)</button>
<button onclick="buyMedic()">Medis (15)</button>

</div>

<div id="joystick"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// CAMERA
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,2,5);

// RENDER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(50,100,50);
scene.add(sun);

// TANAH
const ground = new THREE.Mesh(

new THREE.PlaneGeometry(600,600),

new THREE.MeshLambertMaterial({color:0x3b7d2b})

);

ground.rotation.x=-Math.PI/2;
scene.add(ground);

// PLAYER
let player={
x:0,
z:0,
speed:0.15,
class:"None"
};

// COIN
let coinCount=0;

// POHON
function createTree(x,z){

const trunk=new THREE.Mesh(

new THREE.CylinderGeometry(0.3,0.3,2),

new THREE.MeshLambertMaterial({color:0x8b4513})

);

trunk.position.set(x,1,z);

const leaves=new THREE.Mesh(

new THREE.BoxGeometry(2,2,2),

new THREE.MeshLambertMaterial({color:0x228b22})

);

leaves.position.set(x,3,z);

scene.add(trunk);
scene.add(leaves);

}

// buat hutan
for(let i=0;i<150;i++){

createTree(
(Math.random()-0.5)*400,
(Math.random()-0.5)*400
);

}

// KOIN
let coins=[];

function spawnCoin(){

const coin=new THREE.Mesh(

new THREE.CylinderGeometry(0.5,0.5,0.2,32),

new THREE.MeshLambertMaterial({color:0xffd700})

);

coin.rotation.x=Math.PI/2;

coin.position.set(
(Math.random()-0.5)*400,
1,
(Math.random()-0.5)*400
);

scene.add(coin);
coins.push(coin);

}

for(let i=0;i<60;i++) spawnCoin();

// HEWAN
function spawnAnimal(){

const wolf=new THREE.Mesh(

new THREE.BoxGeometry(1.5,1,3),

new THREE.MeshLambertMaterial({color:0x555555})

);

wolf.position.set(
(Math.random()-0.5)*400,
0.5,
(Math.random()-0.5)*400
);

scene.add(wolf);

}

for(let i=0;i<10;i++) spawnAnimal();

// JOYSTICK
let joy={x:0,y:0};

const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");

let dragging=false;

joystick.addEventListener("pointerdown",()=>dragging=true);

window.addEventListener("pointerup",()=>{

dragging=false;
joy.x=0;
joy.y=0;
stick.style.left="30px";
stick.style.top="30px";

});

window.addEventListener("pointermove",e=>{

if(!dragging) return;

const rect=joystick.getBoundingClientRect();

let x=e.clientX-rect.left-60;
let y=e.clientY-rect.top-60;

let dist=Math.sqrt(x*x+y*y);

if(dist>30){

x=x*30/dist;
y=y*30/dist;

}

stick.style.left=(30+x)+"px";
stick.style.top=(30+y)+"px";

joy.x=x/30;
joy.y=y/30;

});

// UPDATE
function update(){

player.x += joy.x * player.speed;
player.z += joy.y * player.speed;

camera.position.x=player.x;
camera.position.z=player.z+5;

camera.lookAt(player.x,0,player.z);

// ambil koin
coins.forEach((coin,i)=>{

let dx=coin.position.x-player.x;
let dz=coin.position.z-player.z;

if(Math.sqrt(dx*dx+dz*dz)<2){

scene.remove(coin);
coins.splice(i,1);

let gain=1;

if(player.class=="Penjelajah") gain=2;
if(player.class=="Pemburu Koin Raksasa") gain=5;

coinCount+=gain;

document.getElementById("coin").textContent=coinCount;

spawnCoin();

}

});

}

// LOOP
function animate(){

requestAnimationFrame(animate);

update();

renderer.render(scene,camera);

}

animate();

// CLASS
function buyExplorer(){

if(coinCount>=10){

coinCount-=10;

player.class="Penjelajah";

player.speed=0.18;

document.getElementById("class").textContent="Penjelajah";

}

}

function buyHunter(){

if(coinCount>=20){

coinCount-=20;

player.class="Pemburu Koin Raksasa";

player.speed=0.22;

document.getElementById("class").textContent="Pemburu Koin Raksasa";

}

}

function buyGuard(){

if(coinCount>=15){

coinCount-=15;

player.class="Penjaga Hutan";

document.getElementById("class").textContent="Penjaga Hutan";

}

}

function buyMedic(){

if(coinCount>=15){

coinCount-=15;

player.class="Medis";

document.getElementById("class").textContent="Medis";

}

}

// HARI
let day=1;

setInterval(()=>{

day++;

document.getElementById("day").textContent=day;

if(day==99){

alert("Helikopter datang! Kamu selamat dari hutan!");

}

},10000);

</script>

</body>
</html>
